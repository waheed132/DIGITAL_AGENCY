# Railway: set service "Root Directory" to `backend`.
# optimize:clear avoids stale config/route cache breaking CORS paths after deploy.
#
# NOTE: Do not wrap PORT in single quotes (sh -c '... $PORT ...') or it will not expand.

[build]
builder = "nixpacks"

[deploy]
startCommand = "php artisan optimize:clear && php artisan serve --host=0.0.0.0 --port=${PORT:-8080}"
restartPolicyType = "ON_FAILURE"
