# Railway: uses repo root = backend (set "Root Directory" to `backend` on the service).
# 502 + "CORS missing" in the browser usually means the proxy got no valid Laravel response
# (app crashed, wrong port, or process not listening on 0.0.0.0).

[build]
builder = "nixpacks"

[deploy]
startCommand = "sh -c 'php artisan serve --host=0.0.0.0 --port=${PORT:-8080}'"
restartPolicyType = "ON_FAILURE"
